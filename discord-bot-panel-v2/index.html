<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BOT CONTROL — PANEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #222222; --border-hi: #333333;
    --amber: #f59e0b; --amber-dim: #92600a; --amber-glow: #f59e0b33;
    --green: #22c55e; --red: #ef4444; --text: #e5e5e5; --muted: #555555; --label: #888888;
  }
  html { height: 100%; }
  body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.6; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 4px); }
  .shell { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }
  header { border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 40px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .logo-tag { font-size: 10px; letter-spacing: .2em; color: var(--amber); text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: .04em; color: #fff; }
  h1 span { color: var(--amber); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 6px; transition: background .4s, box-shadow .4s; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 8px var(--green); } 50% { box-shadow: 0 0 16px var(--green); } }
  .status-label { font-size: 11px; color: var(--label); letter-spacing: .1em; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 28px; margin-bottom: 20px; position: relative; transition: border-color .2s; }
  .card:hover { border-color: var(--border-hi); }
  .card::before { content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%; background: var(--amber-dim); border-radius: 2px 0 0 2px; transition: background .2s; }
  .card:hover::before { background: var(--amber); }
  .card-title { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--amber); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--label); margin-bottom: 6px; }
  input[type="text"], input[type="url"] { width: 100%; background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
  input[type="text"]:focus, input[type="url"]:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 2px var(--amber-glow); }
  input::placeholder { color: var(--muted); }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  button { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; border: none; border-radius: 2px; padding: 10px 22px; cursor: pointer; transition: opacity .15s, transform .1s, box-shadow .2s; }
  button:active { transform: scale(.97); }
  .btn-primary { background: var(--amber); color: #000; }
  .btn-primary:hover { opacity: .9; box-shadow: 0 0 20px var(--amber-glow); }
  .btn-success { background: transparent; color: var(--green); border: 1px solid var(--green); }
  .btn-success:hover { background: rgba(34,197,94,.08); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: rgba(239,68,68,.08); }
  button:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-spinner { display: none; width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
  button.loading .btn-spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Upload zone */
  .upload-zone { border: 1px dashed var(--border-hi); border-radius: 2px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-top: 16px; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--amber); background: var(--amber-glow); }
  .upload-zone input { display: none; }
  .upload-zone-text { color: var(--muted); font-size: 12px; }
  .upload-zone-text span { color: var(--amber); }
  /* Progress bar */
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; display: none; }
  .progress-bar-fill { height: 100%; background: var(--amber); width: 0%; transition: width .3s; }
  /* Track list */
  .track-item { background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .track-name { color: var(--text); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .track-delete { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 2px 6px; opacity: .6; transition: opacity .2s; letter-spacing: 0; }
  .track-delete:hover { opacity: 1; }
  /* Webhook items */
  .webhook-item { background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px; padding: 12px 14px; margin-bottom: 8px; }
  .webhook-item-name { color: var(--amber); font-size: 12px; margin-bottom: 6px; }
  .webhook-item-url { color: var(--muted); font-size: 11px; word-break: break-all; cursor: pointer; transition: color .2s; }
  .webhook-item-url:hover { color: var(--text); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
  #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column-reverse; gap: 10px; z-index: 999; pointer-events: none; }
  .toast { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 12px 18px; border-radius: 2px; border-left: 3px solid; max-width: 340px; backdrop-filter: blur(8px); animation: toast-in .25s ease forwards; pointer-events: all; }
  .toast.success { background: rgba(17,17,17,.95); border-color: var(--green); color: var(--green); }
  .toast.error { background: rgba(17,17,17,.95); border-color: var(--red); color: var(--red); }
  .toast.out { animation: toast-out .25s ease forwards; }
  @keyframes toast-in { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes toast-out { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(20px); } }
  footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); letter-spacing: .1em; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div>
      <div class="logo-tag">Discord Bot</div>
      <h1>CONTROL<span>_</span>PANEL</h1>
    </div>
    <div>
      <span class="status-dot" id="status-dot"></span>
      <span class="status-label" id="status-label">OFFLINE</span>
    </div>
  </header>

  <!-- Connection -->
  <div class="card">
    <div class="card-title">⚙ Connection</div>
    <div class="field">
      <label>Backend URL</label>
      <input type="url" id="backend-url" placeholder="https://fuckingbot-byiz.onrender.com" />
      <p class="hint">Сохраняется автоматически.</p>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="checkStatus()"><span class="btn-spinner"></span>PING</button>
    </div>
  </div>

  <!-- Give Role -->
  <div class="card">
    <div class="card-title">👤 Выдать роль</div>
    <div class="field"><label>User ID</label><input type="text" id="user-id" placeholder="123456789012345678" /></div>
    <div class="field"><label>Название роли</label><input type="text" id="role-name" placeholder="Member" /></div>
    <div class="field"><label>Guild ID</label><input type="text" id="guild-id" placeholder="987654321098765432" /></div>
    <div class="btn-row">
      <button class="btn-primary" id="btn-give" onclick="giveRole()"><span class="btn-spinner"></span>ВЫДАТЬ</button>
    </div>
  </div>

  <!-- Music player -->
  <div class="card">
    <div class="card-title">🎵 Музыка</div>
    <div class="field">
      <label>Голосовой канал</label>
      <input type="text" id="channel-name" placeholder="General" />
    </div>
    <div class="btn-row">
      <button class="btn-success" id="btn-play" onclick="playMusic()"><span class="btn-spinner"></span>▶ ВКЛЮЧИТЬ</button>
      <button class="btn-danger" id="btn-stop" onclick="stopMusic()"><span class="btn-spinner"></span>■ ВЫКЛЮЧИТЬ</button>
    </div>
  </div>

  <!-- Music library -->
  <div class="card">
    <div class="card-title">📁 Библиотека треков</div>

    <div class="field">
      <label>Название трека (необязательно)</label>
      <input type="text" id="track-name-input" placeholder="Ambient Track 1" />
    </div>

    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="file-input" accept=".mp3,.wav,.ogg,.flac,.m4a" onchange="uploadTrack(this.files[0])" />
      <div class="upload-zone-text">Перетащи файл или <span>нажми для выбора</span><br>MP3, WAV, OGG, FLAC, M4A</div>
      <div class="progress-bar" id="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>

    <div class="btn-row">
      <button class="btn-success" id="btn-refresh-tracks" onclick="loadTracks()"><span class="btn-spinner"></span>↻ ОБНОВИТЬ СПИСОК</button>
    </div>

    <div id="tracks-container" style="margin-top:20px; display:none;">
      <div style="border-top:1px solid var(--border); padding-top:16px;">
        <label style="margin-bottom:10px; display:block;">Треки в библиотеке</label>
        <div id="tracks-list"></div>
      </div>
    </div>
  </div>

  <!-- Webhooks -->
  <div class="card">
    <div class="card-title">🔗 Вебхуки</div>
    <div class="field"><label>Текстовый канал</label><input type="text" id="webhook-channel" placeholder="general" /></div>
    <div class="field"><label>Название вебхука</label><input type="text" id="webhook-name-input" placeholder="My Webhook" /></div>
    <div class="btn-row">
      <button class="btn-primary" id="btn-create-webhook" onclick="createWebhook()"><span class="btn-spinner"></span>+ СОЗДАТЬ</button>
      <button class="btn-success" id="btn-list-webhooks" onclick="listWebhooks()"><span class="btn-spinner"></span>≡ СПИСОК</button>
    </div>
    <div id="webhook-result" style="display:none; margin-top:20px;">
      <div style="border-top:1px solid var(--border); padding-top:16px;">
        <label>URL вебхука</label>
        <div style="display:flex; gap:8px; margin-top:6px;">
          <input type="text" id="webhook-url-output" readonly style="flex:1; color:var(--amber); cursor:pointer;" onclick="copyWebhookUrl()" />
          <button class="btn-primary" onclick="copyWebhookUrl()" style="padding:10px 14px;">КОПИРОВАТЬ</button>
        </div>
      </div>
    </div>
    <div id="webhooks-list" style="display:none; margin-top:20px;">
      <div style="border-top:1px solid var(--border); padding-top:16px;">
        <label style="margin-bottom:10px; display:block;">Существующие вебхуки</label>
        <div id="webhooks-list-items"></div>
      </div>
    </div>
  </div>

  <footer>
    <span>BOT_CONTROL v2.0.0 · Flask + Cloudinary</span>
    <span>Python discord.py + FFmpeg</span>
  </footer>
</div>

<div id="toast-container"></div>

<script>
function getBase() { return (document.getElementById('backend-url').value || '').replace(/\/$/, ''); }
function saveUrl() { localStorage.setItem('bot_backend_url', document.getElementById('backend-url').value); }
function loadSaved() {
  const u = localStorage.getItem('bot_backend_url'); if (u) document.getElementById('backend-url').value = u;
  const g = localStorage.getItem('bot_guild_id'); if (g) document.getElementById('guild-id').value = g;
}
document.getElementById('backend-url').addEventListener('input', saveUrl);
document.getElementById('guild-id').addEventListener('input', () => localStorage.setItem('bot_guild_id', document.getElementById('guild-id').value));

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type==='success' ? '✓ ' : '✗ ') + msg;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 4000);
}
function setLoading(btn, state) { btn.disabled = state; btn.classList.toggle('loading', state); }

async function api(endpoint, method='POST', body=null) {
  const res = await fetch(getBase() + endpoint, {
    method, headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

async function checkStatus() {
  const btn = event.currentTarget; setLoading(btn, true);
  try {
    const d = await api('/status', 'GET');
    document.getElementById('status-dot').className = 'status-dot live';
    document.getElementById('status-label').textContent = d.is_playing ? 'PLAYING ♪' : 'ONLINE';
    toast(`Бот онлайн · ${d.music_files} треков (${d.cloudinary_tracks} в облаке)`);
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-label').textContent = 'OFFLINE';
    toast('Нет соединения: ' + e.message, 'error');
  } finally { setLoading(btn, false); }
}

async function giveRole() {
  const btn = document.getElementById('btn-give');
  const userId = document.getElementById('user-id').value.trim();
  const roleName = document.getElementById('role-name').value.trim();
  const guildId = document.getElementById('guild-id').value.trim();
  if (!userId || !roleName || !guildId) { toast('Заполните все поля', 'error'); return; }
  setLoading(btn, true);
  try { const d = await api('/give-role', 'POST', {user_id: userId, role_name: roleName, guild_id: guildId}); toast(d.message); }
  catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function playMusic() {
  const btn = document.getElementById('btn-play');
  const ch = document.getElementById('channel-name').value.trim();
  if (!ch) { toast('Укажите канал', 'error'); return; }
  setLoading(btn, true);
  try {
    const d = await api('/play', 'POST', {channel: ch});
    toast(d.message);
    document.getElementById('status-label').textContent = 'PLAYING ♪';
    document.getElementById('status-dot').className = 'status-dot live';
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function stopMusic() {
  const btn = document.getElementById('btn-stop'); setLoading(btn, true);
  try { const d = await api('/stop', 'POST'); toast(d.message); document.getElementById('status-label').textContent = 'ONLINE'; }
  catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

// ── Upload track ───────────────────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag'); }
function onDragLeave(e) { document.getElementById('upload-zone').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) uploadTrack(file);
}

async function uploadTrack(file) {
  if (!file) return;
  const name = document.getElementById('track-name-input').value.trim() || file.name.replace(/\.[^.]+$/, '');
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  bar.style.display = 'block'; fill.style.width = '10%';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('name', name);

  try {
    fill.style.width = '40%';
    const res = await fetch(getBase() + '/upload-track', { method: 'POST', body: formData });
    fill.style.width = '90%';
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Upload failed');
    fill.style.width = '100%';
    toast(json.message || 'Трек загружен!');
    document.getElementById('track-name-input').value = '';
    document.getElementById('file-input').value = '';
    setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; loadTracks(); }, 800);
  } catch(e) {
    bar.style.display = 'none'; fill.style.width = '0%';
    toast('Ошибка загрузки: ' + e.message, 'error');
  }
}

async function loadTracks() {
  const btn = document.getElementById('btn-refresh-tracks'); setLoading(btn, true);
  try {
    const d = await api('/tracks', 'GET');
    const list = document.getElementById('tracks-list');
    list.innerHTML = '';
    const all = [...d.tracks, ...d.local];
    if (all.length === 0) {
      list.innerHTML = '<p class="hint">Треков нет. Загрузи первый!</p>';
    } else {
      all.forEach(t => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.innerHTML = `
          <div class="track-name">${t.name}</div>
          ${t.public_id ? `<button class="track-delete" onclick="deleteTrack('${t.public_id}', this)" title="Удалить">✕</button>` : '<span style="color:var(--muted);font-size:10px;">local</span>'}
        `;
        list.appendChild(item);
      });
    }
    document.getElementById('tracks-container').style.display = 'block';
    toast(`Треков: ${all.length}`);
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function deleteTrack(publicId, btn) {
  if (!confirm('Удалить трек?')) return;
  btn.disabled = true;
  try {
    await api('/delete-track', 'POST', {public_id: publicId});
    toast('Трек удалён');
    loadTracks();
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); btn.disabled = false; }
}

// ── Webhooks ───────────────────────────────────────────────────────────────────
async function createWebhook() {
  const btn = document.getElementById('btn-create-webhook');
  const channel = document.getElementById('webhook-channel').value.trim();
  const name = document.getElementById('webhook-name-input').value.trim();
  const guildId = document.getElementById('guild-id').value.trim();
  if (!channel) { toast('Укажите канал', 'error'); return; }
  setLoading(btn, true);
  document.getElementById('webhook-result').style.display = 'none';
  try {
    const d = await api('/create-webhook', 'POST', {channel, webhook_name: name || 'Bot Webhook', guild_id: guildId});
    document.getElementById('webhook-url-output').value = d.webhook_url;
    document.getElementById('webhook-result').style.display = 'block';
    toast(d.message);
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

async function listWebhooks() {
  const btn = document.getElementById('btn-list-webhooks');
  const channel = document.getElementById('webhook-channel').value.trim();
  const guildId = document.getElementById('guild-id').value.trim();
  if (!channel) { toast('Укажите канал', 'error'); return; }
  setLoading(btn, true);
  document.getElementById('webhooks-list').style.display = 'none';
  try {
    const d = await api('/list-webhooks', 'POST', {channel, guild_id: guildId});
    const c = document.getElementById('webhooks-list-items'); c.innerHTML = '';
    if (d.webhooks.length === 0) { c.innerHTML = '<p class="hint">Вебхуков нет в этом канале</p>'; }
    else { d.webhooks.forEach(w => { const item = document.createElement('div'); item.className = 'webhook-item'; item.innerHTML = `<div class="webhook-item-name">${w.name}</div><div class="webhook-item-url" onclick="copyText('${w.url}')">${w.url}</div>`; c.appendChild(item); }); }
    document.getElementById('webhooks-list').style.display = 'block';
    toast(`Вебхуков: ${d.webhooks.length}`);
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
  finally { setLoading(btn, false); }
}

function copyWebhookUrl() { copyText(document.getElementById('webhook-url-output').value); }
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано!')).catch(() => {
    const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); toast('Скопировано!');
  });
}

loadSaved();
</script>
</body>
</html>
